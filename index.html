<html>
<head>
    <title>Professional Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero Section -->
    <header>
        <div class="hero">
            <h1>Welcome to My Portfolio</h1>
            <p>Hi, I'm [Your Name], a [Your Profession].</p>
        </div>
    </header>

    <!-- Profile Image Section -->
    <section class="profile-image">
        <img src="path/to/profile-image.jpg" alt="Profile Image">
    </section>

    <!-- About Section -->
    <section class="about">
        <h2>About Me</h2>
        <p>[A brief description about yourself]</p>
    </section>

    <!-- Skills Section -->
    <section class="skills">
        <h2>My Skills</h2>
        <ul>
            <li>Skill 1</li>
            <li>Skill 2</li>
            <li>Skill 3</li>
        </ul>
    </section>

    <!-- Projects Section -->
    <section class="projects">
        <h2>My Projects</h2>
        <ul>
            <li><a href="project1-link">Project 1</a></li>
            <li><a href="project2-link">Project 2</a></li>
            <li><a href="project3-link">Project 3</a></li>
        </ul>
    </section>

    <!-- Contact Section -->
    <section class="contact">
        <h2>Contact Me</h2>
        <p>Email: [Your Email]</p>
    </section>

    <footer>
        <p>&copy; 2026 [Your Name]. All rights reserved.</p>
    </footer>
</body>
</html>
